<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>보드게임 레퍼런스</title>
  <meta name="google-adsense-account" content="ca-pub-4300260005676352">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4300260005676352"
     crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1017;
      --panel: #151a24;
      --panel-strong: #1e2533;
      --text: #f6f7fb;
      --muted: #aeb7c8;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #d8ad66;
      --accent-strong: #ffd38a;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(216, 173, 102, 0.18), transparent 34rem),
        radial-gradient(circle at 88% 0%, rgba(114, 143, 255, 0.16), transparent 30rem),
        linear-gradient(135deg, #090b10 0%, var(--bg) 48%, #111622 100%);
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .lang-switch {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10;
      min-width: 92px;
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 850;
    }

    .lang-switch button {
      border: 0;
      color: inherit;
      background: transparent;
      font: inherit;
      cursor: pointer;
    }

    #lang-button {
      display: inline-flex;
      width: 100%;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(13, 16, 23, 0.72);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(16px);
    }

    .lang-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .lang-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.24);
    }

    .lang-code {
      min-width: 20px;
      line-height: 1;
    }

    .lang-caret {
      color: var(--accent-strong);
      font-size: 0.8rem;
      line-height: 1;
      transition: transform 160ms ease;
    }

    .lang-switch.is-open .lang-caret {
      transform: rotate(180deg);
    }

    .lang-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      display: none;
      min-width: 100%;
      overflow: hidden;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(13, 16, 23, 0.9);
      box-shadow: 0 20px 52px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(16px);
    }

    .lang-switch.is-open .lang-menu {
      display: grid;
      gap: 2px;
    }

    .lang-menu button {
      display: flex;
      width: 100%;
      padding: 8px 9px;
      border-radius: 11px;
      color: rgba(255, 255, 255, 0.78);
      text-align: left;
    }

    .lang-menu button:hover,
    .lang-menu button:focus-visible,
    .lang-menu button[aria-selected="true"] {
      color: #17100a;
      background: var(--accent-strong);
      outline: none;
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .hero {
      margin-bottom: 34px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: currentColor;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 0.98;
      letter-spacing: -0.07em;
    }

    .intro {
      max-width: 660px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.06rem;
    }

    .game-grid {
      display: grid;
      gap: 18px;
    }

    .game-banner {
      position: relative;
      display: grid;
      grid-template-columns: minmax(138px, 220px) 1fr auto;
      min-height: 190px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.08), transparent 42%),
        var(--game-bg, linear-gradient(135deg, var(--panel), var(--panel-strong)));
      box-shadow: var(--shadow);
      isolation: isolate;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .game-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.18) 45%, rgba(0, 0, 0, 0.34) 100%);
      pointer-events: none;
    }

    .game-banner:not(.is-disabled):hover,
    .game-banner:not(.is-disabled):focus-visible {
      transform: translateY(-3px);
      border-color: rgba(255, 211, 138, 0.46);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      outline: none;
    }

    .game-banner.is-disabled {
      cursor: not-allowed;
      opacity: 0.66;
    }

    .cover {
      position: relative;
      min-height: 100%;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.02)),
        var(--cover-image, linear-gradient(135deg, #2a3142, #111622));
      background-position: center;
      background-size: cover;
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(13, 16, 23, 0.66));
    }

    .game-info {
      align-self: center;
      padding: 30px 34px;
    }

    .game-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .tag.is-live {
      background: rgba(216, 173, 102, 0.2);
      color: var(--accent-strong);
    }

    .game-title {
      margin: 0;
      font-size: clamp(1.72rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: -0.045em;
    }

    .game-desc {
      max-width: 560px;
      margin: 12px 0 0;
      color: var(--muted);
    }

    .game-action {
      align-self: stretch;
      display: grid;
      place-items: center;
      min-width: 150px;
      padding: 26px;
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--accent-strong);
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .game-action span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .game-action span::after {
      content: "->";
      transition: transform 180ms ease;
    }

    .game-banner.is-disabled .game-action span::after {
      content: "";
    }

    .game-banner:not(.is-disabled):hover .game-action span::after,
    .game-banner:not(.is-disabled):focus-visible .game-action span::after {
      transform: translateX(4px);
    }

    .note {
      margin: 22px 0 0;
      color: rgba(255, 255, 255, 0.54);
      font-size: 0.92rem;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 560px);
        padding: 82px 0 34px;
      }

      .lang-switch {
        top: 14px;
        right: 12px;
      }

      .game-banner {
        grid-template-columns: 112px 1fr;
        min-height: 178px;
        border-radius: 22px;
      }

      .game-info {
        padding: 22px 20px;
      }

      .game-action {
        grid-column: 1 / -1;
        justify-content: start;
        min-width: 0;
        min-height: 58px;
        padding: 0 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-left: 0;
        place-items: center start;
      }
    }
  </style>
</head>
<body>
  <div class="lang-switch" id="lang-switch">
    <button type="button" aria-haspopup="listbox" aria-expanded="false" id="lang-button">
      <span class="lang-label">
        <img class="lang-icon" data-current-lang-icon src="/gah/img/flag-kr.svg" alt="" aria-hidden="true">
        <span class="lang-code" data-current-lang-code>KR</span>
      </span>
      <span class="lang-caret" aria-hidden="true">▾</span>
    </button>
    <div class="lang-menu" role="listbox" aria-label="Language">
      <button type="button" role="option" data-lang="en" aria-selected="false"><span class="lang-label"><img class="lang-icon" src="/gah/img/flag-us.svg" alt="" aria-hidden="true"><span class="lang-code">EN</span></span></button>
      <button type="button" role="option" data-lang="ko" aria-selected="true"><span class="lang-label"><img class="lang-icon" src="/gah/img/flag-kr.svg" alt="" aria-hidden="true"><span class="lang-code">KR</span></span></button>
      <button type="button" role="option" data-lang="de" aria-selected="false"><span class="lang-label"><img class="lang-icon" src="/gah/img/flag-de.svg" alt="" aria-hidden="true"><span class="lang-code">DE</span></span></button>
      <button type="button" role="option" data-lang="fr" aria-selected="false"><span class="lang-label"><img class="lang-icon" src="/gah/img/flag-fr.svg" alt="" aria-hidden="true"><span class="lang-code">FR</span></span></button>
      <button type="button" role="option" data-lang="ja" aria-selected="false"><span class="lang-label"><img class="lang-icon" src="/gah/img/flag-jp.svg" alt="" aria-hidden="true"><span class="lang-code">JP</span></span></button>
      <button type="button" role="option" data-lang="es" aria-selected="false"><span class="lang-label"><img class="lang-icon" src="/gah/img/flag-es.svg" alt="" aria-hidden="true"><span class="lang-code">ES</span></span></button>
    </div>
  </div>

  <main class="page">
    <header class="hero">
      <p class="eyebrow">Board Game Reference</p>
      <h1 data-i18n="heroTitle">보드게임 레퍼런스 게이트</h1>
      <p class="intro" data-i18n="heroIntro">플레이 중 자주 확인하는 카드, 룰, 보너스 정보를 빠르게 찾아가는 레퍼런스 허브입니다.</p>
    </header>

    <section class="game-grid" aria-label="보드게임 레퍼런스 목록" data-i18n-aria-label="gameListLabel">
      <a
        class="game-banner"
        href="/gah/"
        style="--game-bg: linear-gradient(135deg, #281a13 0%, #69472c 48%, #1c1310 100%); --cover-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRAkQ_XkZBEZFWoyCta3_j6y-1hzT_Ai-oTVPqaKy-yqA&amp;s');"
      >
        <div class="cover" aria-hidden="true"></div>
        <div class="game-info">
          <div class="game-meta">
            <span class="tag is-live">OPEN</span>
            <span class="tag" data-i18n="gahTag">카드 / 타일</span>
          </div>
          <h2 class="game-title">Grand Austria Hotel</h2>
          <p class="game-desc" data-i18n="gahDesc">그랜드 오스트리아 호텔 카드와 설명을 빠르게 확인합니다.</p>
        </div>
        <div class="game-action" aria-hidden="true"><span data-i18n="enterAction">입장</span></div>
      </a>

      <article
        class="game-banner is-disabled"
        aria-disabled="true"
        style="--game-bg: linear-gradient(135deg, #3b1f16 0%, #a45d34 50%, #21110d 100%); --cover-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTQN-fKTcTmOeKT8C7gdimvF3jMB0oP1JlUxw&amp;s');"
      >
        <div class="cover" aria-hidden="true"></div>
        <div class="game-info">
          <div class="game-meta">
            <span class="tag">COMING SOON</span>
            <span class="tag" data-i18n="marrakechTag">타일</span>
          </div>
          <h2 class="game-title">Marrakech</h2>
          <p class="game-desc" data-i18n="marrakechDesc">마라케시 레퍼런스 페이지를 추가할 수 있는 예약 슬롯입니다.</p>
        </div>
        <div class="game-action" aria-hidden="true"><span data-i18n="comingSoonAction">준비중</span></div>
      </article>
    </section>

    <p class="note" data-i18n-html="coverNote">표지 이미지는 각 배너의 <code>--cover-image: url('/img/파일명.jpg')</code> 값으로 교체하면 됩니다.</p>
  </main>

  <script>
    const translations = {
      ko: {
        documentTitle: "보드게임 레퍼런스",
        heroTitle: "보드게임 레퍼런스 게이트",
        heroIntro: "플레이 중 자주 확인하는 카드, 룰, 보너스 정보를 빠르게 찾아가는 레퍼런스 허브입니다.",
        gameListLabel: "보드게임 레퍼런스 목록",
        gahTag: "카드 / 타일",
        gahDesc: "그랜드 오스트리아 호텔 카드와 설명을 빠르게 확인합니다.",
        enterAction: "입장",
        marrakechTag: "타일",
        marrakechDesc: "마라케시 레퍼런스 페이지를 추가할 수 있는 예약 슬롯입니다.",
        comingSoonAction: "준비중",
        coverNote: "표지 이미지는 각 배너의 <code>--cover-image: url('/img/파일명.jpg')</code> 값으로 교체하면 됩니다."
      },
      en: {
        documentTitle: "Board Game Reference",
        heroTitle: "Board Game Reference Gate",
        heroIntro: "A quick hub for checking cards, tiles, and bonus details during play.",
        gameListLabel: "Board game reference list",
        gahTag: "Cards / Tiles",
        gahDesc: "Quickly check Grand Austria Hotel cards and descriptions.",
        enterAction: "Enter",
        marrakechTag: "Tiles",
        marrakechDesc: "Reserved slot for the upcoming Marrakech reference page.",
        comingSoonAction: "Coming soon",
        coverNote: "Cover images can be replaced with each banner's <code>--cover-image: url('/img/file-name.jpg')</code> value."
      },
      de: {
        documentTitle: "Brettspiel-Referenz",
        heroTitle: "Brettspiel-Referenzportal",
        heroIntro: "Ein schneller Hub für Karten, Plättchen und Bonusdetails während des Spiels.",
        gameListLabel: "Liste der Brettspiel-Referenzen",
        gahTag: "Karten / Plättchen",
        gahDesc: "Karten und Beschreibungen zu Grand Austria Hotel schnell nachschlagen.",
        enterAction: "Öffnen",
        marrakechTag: "Plättchen",
        marrakechDesc: "Reservierter Platz für die kommende Marrakech-Referenzseite.",
        comingSoonAction: "In Vorbereitung",
        coverNote: "Titelbilder können über den Wert <code>--cover-image: url('/img/dateiname.jpg')</code> jedes Banners ersetzt werden."
      },
      fr: {
        documentTitle: "Référence Jeux de Société",
        heroTitle: "Portail de Références",
        heroIntro: "Un hub rapide pour consulter cartes, tuiles et bonus pendant la partie.",
        gameListLabel: "Liste des références de jeux",
        gahTag: "Cartes / Tuiles",
        gahDesc: "Consultez rapidement les cartes et descriptions de Grand Austria Hotel.",
        enterAction: "Entrer",
        marrakechTag: "Tuiles",
        marrakechDesc: "Emplacement réservé pour la future page de référence Marrakech.",
        comingSoonAction: "Bientôt",
        coverNote: "Les images de couverture peuvent être remplacées avec la valeur <code>--cover-image: url('/img/nom-fichier.jpg')</code> de chaque bannière."
      },
      ja: {
        documentTitle: "ボードゲームリファレンス",
        heroTitle: "ボードゲームリファレンスゲート",
        heroIntro: "プレイ中によく確認するカード、タイル、ボーナス情報へすばやく移動するためのハブです。",
        gameListLabel: "ボードゲームリファレンス一覧",
        gahTag: "カード / タイル",
        gahDesc: "グランドオーストリアホテルのカードと説明をすばやく確認します。",
        enterAction: "入場",
        marrakechTag: "タイル",
        marrakechDesc: "マラケシュのリファレンスページを追加するための予約枠です。",
        comingSoonAction: "準備中",
        coverNote: "表紙画像は各バナーの <code>--cover-image: url('/img/file-name.jpg')</code> の値で差し替えできます。"
      },
      es: {
        documentTitle: "Referencia de Juegos de Mesa",
        heroTitle: "Portal de Referencias",
        heroIntro: "Un centro rápido para consultar cartas, losetas y detalles de bonificación durante la partida.",
        gameListLabel: "Lista de referencias de juegos de mesa",
        gahTag: "Cartas / Losetas",
        gahDesc: "Consulta rápidamente las cartas y descripciones de Grand Austria Hotel.",
        enterAction: "Entrar",
        marrakechTag: "Losetas",
        marrakechDesc: "Espacio reservado para la futura página de referencia de Marrakech.",
        comingSoonAction: "Próximamente",
        coverNote: "Las imágenes de portada se pueden reemplazar con el valor <code>--cover-image: url('/img/nombre-archivo.jpg')</code> de cada banner."
      }
    };

    const languageMeta = {
      en: { code: "EN", icon: "/gah/img/flag-us.svg" },
      ko: { code: "KR", icon: "/gah/img/flag-kr.svg" },
      de: { code: "DE", icon: "/gah/img/flag-de.svg" },
      fr: { code: "FR", icon: "/gah/img/flag-fr.svg" },
      ja: { code: "JP", icon: "/gah/img/flag-jp.svg" },
      es: { code: "ES", icon: "/gah/img/flag-es.svg" }
    };

    const supportedLanguages = Object.keys(translations);
    const langSwitch = document.getElementById("lang-switch");
    const langButton = document.getElementById("lang-button");
    const languageButtons = document.querySelectorAll(".lang-menu [data-lang]");
    const currentLangIcon = document.querySelector("[data-current-lang-icon]");
    const currentLangCode = document.querySelector("[data-current-lang-code]");

    function setLanguageMenuOpen(isOpen) {
      langSwitch.classList.toggle("is-open", isOpen);
      langButton.setAttribute("aria-expanded", String(isOpen));
    }

    function getInitialLanguage() {
      const params = new URLSearchParams(window.location.search);
      const requestedLanguage = params.get("lang");
      const savedLanguage = localStorage.getItem("referenceLanguage");
      const browserLanguage = navigator.language.slice(0, 2);

      if (supportedLanguages.includes(requestedLanguage)) return requestedLanguage;
      if (supportedLanguages.includes(savedLanguage)) return savedLanguage;
      if (supportedLanguages.includes(browserLanguage)) return browserLanguage;
      return "ko";
    }

    function applyLanguage(language) {
      const copy = translations[language] || translations.ko;
      const meta = languageMeta[language] || languageMeta.ko;
      document.documentElement.lang = language;
      document.title = copy.documentTitle;
      localStorage.setItem("referenceLanguage", language);

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = copy[element.dataset.i18n];
      });

      document.querySelectorAll("[data-i18n-html]").forEach((element) => {
        element.innerHTML = copy[element.dataset.i18nHtml];
      });

      document.querySelectorAll("[data-i18n-aria-label]").forEach((element) => {
        element.setAttribute("aria-label", copy[element.dataset.i18nAriaLabel]);
      });

      languageButtons.forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.lang === language));
      });

      currentLangIcon.src = meta.icon;
      currentLangCode.textContent = meta.code;
      setLanguageMenuOpen(false);
    }

    langButton.addEventListener("click", () => {
      setLanguageMenuOpen(!langSwitch.classList.contains("is-open"));
    });

    languageButtons.forEach((button) => {
      button.addEventListener("click", () => applyLanguage(button.dataset.lang));
    });

    document.addEventListener("click", (event) => {
      if (!langSwitch.contains(event.target)) setLanguageMenuOpen(false);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") setLanguageMenuOpen(false);
    });

    applyLanguage(getInitialLanguage());
  </script>
</body>
</html>
